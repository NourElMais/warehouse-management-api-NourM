<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Warehouse Login</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="page">

    <section class="branding-section">
        <div class="overlay"></div>

        <div class="branding-content">
            <div class="logo-box">📦</div>

            <h1>
                Warehouse<br>
                Management <span>API</span>
            </h1>

            <div class="line"></div>
        </div>
    </section>

    <section class="login-section">

        <div class="login-card">

            <div class="small-logo">📦</div>

            <h2>Welcome Back!</h2>

            <p class="subtitle">
                Sign in to access the API documentation
            </p>

            <form id="loginForm">

                <label for="email">Email</label>

                <div class="input-group">
                    <span class="input-icon">👤</span>

                    <input
                            id="email"
                            type="email"
                            placeholder="admin@outlook.com"
                            required>
                </div>

                <label for="password">Password</label>

                <div class="input-group">
                    <span class="input-icon">🔒</span>

                    <input
                            id="password"
                            type="password"
                            placeholder="Enter your password"
                            required>
                </div>

                <button type="submit">
                    Sign in
                </button>

            </form>

            <p id="errorMessage"></p>

            <div class="secure-section">
                <span></span>
                <p>Secure and protected</p>
                <span></span>
            </div>

            <p class="security-message">
                🔒 Handled by Firebase
            </p>

        </div>

        <footer>
            © 2026 Warehouse Management API
        </footer>

    </section>

</div>

<script src="app.js"></script>

</body>
</html>
